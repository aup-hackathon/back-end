name: flowforge

services:
  app-db:
    image: pgvector/pgvector:pg16
    container_name: flowforge-app-db
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-appdb}
      POSTGRES_USER: ${APP_DB_USER:-app}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-change-me-app-db-password}
    ports:
      - '${APP_DB_PORT:-5432}:5432'
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./infra/app-db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  elsa-db:
    image: postgres:16-alpine
    container_name: flowforge-elsa-db
    environment:
      POSTGRES_DB: ${ELSA_DB_NAME:-elsadb}
      POSTGRES_USER: ${ELSA_DB_USER:-elsa}
      POSTGRES_PASSWORD: ${ELSA_DB_PASSWORD:-change-me-elsa-db-password}
    ports:
      - '${ELSA_DB_PORT:-5433}:5432'
    volumes:
      - elsa-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  nats:
    build:
      context: ./infra/nats
    container_name: flowforge-nats
    command: ['-c', '/etc/nats/nats.conf']
    ports:
      - '${NATS_PORT:-4222}:4222'
      - '${NATS_MONITOR_PORT:-8222}:8222'
    volumes:
      - nats-data:/data
      - ./infra/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8222/healthz']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  nats-init:
    image: natsio/nats-box:latest
    container_name: flowforge-nats-init
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./infra/nats-stream-bootstrap.sh:/bootstrap.sh:ro
    entrypoint: ['sh', '/bootstrap.sh']
    restart: 'no'

  minio:
    image: minio/minio:latest
    container_name: flowforge-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: flowforge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
    volumes:
      - ./infra/minio-bootstrap.sh:/bootstrap.sh:ro
    entrypoint: ['sh', '/bootstrap.sh']
    restart: 'no'

  ollama:
    image: ollama/ollama:latest
    container_name: flowforge-ollama
    ports:
      - '${OLLAMA_PORT:-11434}:11434'
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  ollama-init:
    image: ollama/ollama:latest
    container_name: flowforge-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-mistral:7b-instruct}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ollama-models:/root/.ollama
      - ./infra/ollama-pull.sh:/ollama-pull.sh:ro
    entrypoint: ['sh', '/ollama-pull.sh']
    restart: 'no'

  elsa-server:
    image: ${ELSA_SERVER_IMAGE:-elsaworkflows/elsa-server-v3-5:latest}
    container_name: flowforge-elsa
    depends_on:
      elsa-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      HTTP_PORTS: 8080
      HTTP__BASEURL: http://localhost:${ELSA_PORT:-5000}
      ConnectionStrings__Elsa: Host=elsa-db;Database=${ELSA_DB_NAME:-elsadb};Username=${ELSA_DB_USER:-elsa};Password=${ELSA_DB_PASSWORD:-change-me-elsa-db-password}
    ports:
      - '${ELSA_PORT:-5000}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/health || wget -qO- http://localhost:8080/']
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  nestjs:
    build:
      context: ${NESTJS_CONTEXT:-./backend}
      dockerfile: ${NESTJS_DOCKERFILE:-Dockerfile}
    container_name: flowforge-nestjs
    depends_on:
      app-db:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${APP_DB_USER:-app}:${APP_DB_PASSWORD:-change-me-app-db-password}@app-db:5432/${APP_DB_NAME:-appdb}
      NATS_URL: nats://nats:4222
      NATS_STREAM_NAME: ${NATS_STREAM_NAME:-FLOWFORGE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-me-with-at-least-32-chars-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-me-with-at-least-32-chars-refresh}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-documents}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-exports}
      OLLAMA_URL: http://ollama:11434
      FASTAPI_HEALTH_URL: http://fastapi:8000/health
      FASTAPI_INTERNAL_URL: http://fastapi:8000/internal
      ELSA_HEALTH_URL: http://elsa-server:8080/health
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-false}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '${NESTJS_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health/ping']
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  fastapi:
    build:
      context: ${FASTAPI_CONTEXT:-./ai-service}
    container_name: flowforge-fastapi
    depends_on:
      app-db:
        condition: service_healthy
      nats:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      NATS_STREAM_NAME: ${NATS_STREAM_NAME:-FLOWFORGE}
      OLLAMA_BASE_URL: http://ollama:11434
      APP_POSTGRES_URL: postgres://${APP_DB_USER:-app}:${APP_DB_PASSWORD:-change-me-app-db-password}@app-db:5432/${APP_DB_NAME:-appdb}
      ELSA_POSTGRES_URL: postgres://${ELSA_DB_USER:-elsa}:${ELSA_DB_PASSWORD:-change-me-elsa-db-password}@elsa-db:5432/${ELSA_DB_NAME:-elsadb}
      LLM_MODEL: ${OLLAMA_LLM_MODEL:-mistral:7b-instruct}
      EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    ports:
      - '${FASTAPI_PORT:-8000}:8000'
    healthcheck:
      test: ['CMD-SHELL', "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 10s

  nextjs:
    build:
      context: ${NEXTJS_CONTEXT:-./frontend}
    container_name: flowforge-nextjs
    depends_on:
      nestjs:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3000}
      NEXT_PUBLIC_ELSA_URL: ${NEXT_PUBLIC_ELSA_URL:-http://localhost:5000}
    ports:
      - '${NEXTJS_PORT:-3001}:3001'
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://localhost:3001').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 10s

volumes:
  app-db-data:
  elsa-db-data:
  nats-data:
  minio-data:
  ollama-models:
